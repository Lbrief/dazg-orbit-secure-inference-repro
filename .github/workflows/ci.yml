# DAZG-Orbit Project Source File
# Component: .github/workflows/ci.yml
# Purpose: GitHub continuous-integration and issue-management automation.
# Maintenance: DAZG-Orbit integration, acceleration, and reproducibility layer.
# Provenance and licenses: see NOTICE_UPSTREAM.md and LICENSE_NOTICE.md.
# Validated scope: frozen N=10 and checkpoint-013 balanced N=100.
# Security boundary: reveal correctness backend; security_claim=0.
name: verify-and-build

"on":
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install verification dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-numpy
      - name: Verify assets, results, and source tree
        run: ./reproduce.sh verify

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libssl-dev libgmp-dev \
            python3 python3-numpy
      - name: Build isolated N=10 and N=100 executors
        env:
          DAZG_JOBS: "2"
        run: ./reproduce.sh build
      - name: Run Stage-S contract
        run: ./reproduce.sh stage-s
